name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: den
          POSTGRES_PASSWORD: den
          POSTGRES_DB: den_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ matrix.go-version }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ matrix.go-version }}-

      - name: Build
        run: go build ./...

      - name: Test (SQLite + PostgreSQL)
        env:
          DEN_POSTGRES_URL: postgres://den:den@localhost:5432/den_test?sslmode=disable
        run: go test ${{ matrix.go-version == '1.26' && '-race' || '' }} ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-1.26-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-1.26-

      - uses: golangci/golangci-lint-action@v9

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
