# zizmor configuration — https://docs.zizmor.sh/configuration/
#
# Known accepted risks:
#   - release.yml uses a `workflow_run` trigger so the release job runs
#     only after CI succeeds. zizmor flags `workflow_run` as dangerous
#     because it runs in the context of the default branch with write
#     permissions. The mitigations here are: (a) the ref is pinned to
#     the tag that triggered CI (passed via the VERSION env so no shell
#     interpolation), (b) permissions are limited to `contents: write`,
#     and (c) the job only runs when `head_branch` starts with `v`.

rules:
  dangerous-triggers:
    ignore:
      - release.yml
