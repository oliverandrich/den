[tools]
go = "1.25"
"go:github.com/mfridman/tparse" = "latest"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:github.com/google/go-licenses" = "latest"
"pipx:pre-commit" = "latest"

[env]
COVERAGE_THRESHOLD = "80.0"

[tasks.build]
description = "Build all packages"
run = "go build ./..."

[tasks.ci]
description = "Pre-push checks: build, lint, vuln, test (coverage gate runs separately)"
depends = ["build", "lint", "vuln", "test-ci"]

[tasks.lint]
description = "Run linter"
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Format all Go files"
run = [
    "gofmt -w .",
    "goimports -w .",
]

[tasks.bench]
description = "Run benchmarks (set count=N for statistical significance)"
run = 'go test -bench=. -benchmem -count="${count:-1}" -run="^$" ./engine'

[tasks.tidy]
description = "Tidy module dependencies"
run = "go mod tidy"

[tasks.vuln]
description = "Run vulnerability check"
run = "govulncheck ./..."

[tasks.beans]
description = "List active beans (excludes completed and scrapped)"
run = "beans list --no-status completed --no-status scrapped"

[tasks.clean]
description = "Remove build artifacts and generated files"
run = [
    "rm -rf site",
    "rm -f coverage.out cover.out coverage.html",
    "find . -maxdepth 2 -type f -name '*.coverprofile' -delete 2>/dev/null || true",
    "rm -f docs/changelog.md docs/third-party-licenses.md",
]

[tasks."clean-all"]
description = "Like clean, plus local SQLite test DBs anywhere in the tree"
depends = ["clean"]
run = [
    "find . -type f \\( -name '*.db' -o -name '*.db-shm' -o -name '*.db-wal' \\) -not -path './.git/*' -delete 2>/dev/null || true",
]

